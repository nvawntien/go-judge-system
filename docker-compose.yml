x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 15s

services:
  gateway:
    container_name: judge_gateway
    image: devopsfaith/krakend:2.6.0
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/krakend.json:/etc/krakend/krakend.json:ro
      - ./gateway/symmetric.json:/etc/krakend/symmetric.json:ro
    networks:
      - judge_internal
    depends_on:
      auth-service:
        condition: service_healthy
      problem-service:
        condition: service_healthy
      submission-service:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  postgres:
    container_name: judge_postgres
    image: postgres:15.6-alpine
    restart: unless-stopped
    env_file:
      - ./environment/postgres.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    networks:
      - judge_internal
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-defaults
      test: [ "CMD-SHELL", "pg_isready -U admin -d auth_db" ]
      interval: 5s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  redis:
    container_name: judge_redis
    image: redis:7.2-alpine
    restart: unless-stopped
    env_file:
      - ./environment/redis.env
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      /bin/sh -c "redis-server
        --requirepass $$REDIS_PASSWORD
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec"
    volumes:
      - redis_data:/data
    networks:
      - judge_internal
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-defaults
      test: [ "CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG" ]
      interval: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 192M
  minio:
    container_name: judge_minio
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - ./environment/service.env
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - judge_internal
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-defaults
      test: [ "CMD-SHELL", "mc ready local" ]
      interval: 5s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
  kafka:
    container_name: judge_kafka
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    restart: unless-stopped
    ports:
      - "127.0.0.1:9094:9094"
    environment:
      - KAFKA_KRAFT_CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_CFG_NUM_PARTITIONS=3
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - judge_internal
    logging: *default-logging
    healthcheck:
      <<: *healthcheck-defaults
      test: [ "CMD", "bash", "-lc", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1" ]
      interval: 10s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 768M

  kafka-init:
    container_name: judge_kafka_init
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "/scripts/kafka-init.sh" ]
    volumes:
      - ./infra/kafka/kafka-init.sh:/scripts/kafka-init.sh:ro
    networks:
      - judge_internal
    restart: "no"

  go-judge:
    container_name: judge_sandbox
    build:
      context: .
      dockerfile: build/sandbox/Dockerfile
    restart: unless-stopped
    privileged: true
    ports:
      - "127.0.0.1:5050:5050"
      - "127.0.0.1:5051:5051"
    environment:
      - ES_HTTP_ADDR=0.0.0.0:5050
      - ES_GRPC_ADDR=0.0.0.0:5051
      - ES_ENABLE_GRPC=true
      - ES_ENABLE_DEBUG=false
      - ES_LOG_LEVEL=info
    volumes:
      - testcase_cache:/cache/testcases:ro
    tmpfs:
      - /tmp:size=256M,exec,mode=777
      - /w:size=512M,exec,mode=777
    networks:
      - judge_internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 1024M

  mailhog:
    container_name: judge_mailhog
    image: mailhog/mailhog:v1.0.1
    profiles: [ "dev" ]
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - judge_internal
    logging: *default-logging

  kafka-ui:
    container_name: judge_kafka_ui
    image: provectuslabs/kafka-ui:v0.7.2
    profiles: [ "dev" ]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=judge-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - DYNAMIC_CONFIG_ENABLED=true
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - judge_internal
    logging: *default-logging

  auth-service:
    container_name: judge_auth
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    env_file:
      - ./environment/service.env
    restart: unless-stopped
    volumes:
      - ./services/auth/config:/app/config:ro
      - ./services/auth/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - judge_internal
    logging: *default-logging

  problem-service:
    container_name: judge_problem
    build:
      context: .
      dockerfile: services/problem/Dockerfile
    env_file:
      - ./environment/service.env
    restart: unless-stopped
    volumes:
      - ./services/problem/config:/app/config:ro
      - ./services/problem/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - judge_internal
    logging: *default-logging

  submission-service:
    container_name: judge_submission
    build:
      context: .
      dockerfile: services/submission/Dockerfile
    env_file:
      - ./environment/service.env
    restart: unless-stopped
    volumes:
      - ./services/submission/config:/app/config:ro
      - ./services/submission/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - judge_internal
    logging: *default-logging

  judge-worker:
    container_name: judge_worker
    profiles: [ "worker" ]
    build:
      context: .
      dockerfile: workers/judge/Dockerfile
    env_file:
      - ./environment/service.env
    restart: unless-stopped
    volumes:
      - ./workers/judge/config:/app/config:ro
      - ./workers/judge/logs:/app/logs
      - testcase_cache:/cache/testcases
    tmpfs:
      - /tmp:size=256M,exec,mode=777
      - /w:size=512M,exec,mode=777
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      go-judge:
        condition: service_started
      submission-service:
        condition: service_healthy
    networks:
      - judge_internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

networks:
  judge_internal:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  minio_data:
    driver: local
  testcase_cache:
    driver: local
