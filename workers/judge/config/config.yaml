server:
  port: 0  # not used, judge worker is event-driven

kafka:
  brokers: "kafka:9092"
  consumer_group: "judge-worker-v1"
  job_topic: "judge.submission.jobs"
  result_topic: "judge.submission.results"
  dlt_topic: "judge.submission.jobs.dlt"

judging:
  timeout_seconds: 30
  memory_limit_mb: 256
  go_judge_url: ""
  max_concurrent_jobs: 4
