# Submission Service Configuration
# Sensitive values (passwords, secrets) are overridden by environment variables
# Viper maps env vars: DATABASE_PASSWORD -> database.password

server:
  name: submission-service
  port: 8083
  mode: debug

logger:
  level: debug
  filename: /app/logs/submission.log
  max_size: 10
  max_backups: 5
  max_age: 30
  compress: true

database:
  host: postgres
  port: 5432
  user: admin
  password: ""
  dbname: submission_db
  sslmode: disable
  max_open_conns: 30
  max_idle_conns: 10
  conn_max_lifetime: 3600

kafka:
  brokers: "kafka:9092"
  job_topic: "judge.submission.jobs"
  result_topic: "judge.submission.results"
  dlt_topic: "judge.submission.jobs.dlt"
  consumer_group: "judge-worker-v1"